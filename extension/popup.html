<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="stage" id="stage">
    <div class="bubble hidden" id="bubble"></div>
    <button class="flower-wrap" id="flower" title="戳一下我!">
      <svg viewBox="0 0 240 300" width="120" height="150" aria-hidden="true">
        <g class="sway">
          <path d="M120 160 C 118 200, 122 230, 120 262" stroke="#4caf50" stroke-width="10" fill="none" stroke-linecap="round"/>
          <path d="M120 205 C 95 195, 82 178, 78 160 C 100 162, 116 178, 120 196 Z" fill="#66bb6a"/>
          <path d="M121 228 C 146 220, 160 204, 165 186 C 142 188, 126 202, 121 220 Z" fill="#57a05b"/>
          <g>
            <ellipse cx="120" cy="52"  rx="30" ry="40" fill="#ffd54f"/>
            <ellipse cx="178" cy="94"  rx="30" ry="40" fill="#ffd54f" transform="rotate(72 178 94)"/>
            <ellipse cx="156" cy="162" rx="30" ry="40" fill="#ffca28" transform="rotate(144 156 162)"/>
            <ellipse cx="84"  cy="162" rx="30" ry="40" fill="#ffca28" transform="rotate(216 84 162)"/>
            <ellipse cx="62"  cy="94"  rx="30" ry="40" fill="#ffd54f" transform="rotate(288 62 94)"/>
          </g>
          <circle cx="120" cy="110" r="52" fill="#fff8e1" stroke="#f5c542" stroke-width="5"/>
          <g>
            <ellipse class="eye" cx="100" cy="102" rx="7" ry="11" fill="#3b2f2f"/>
            <ellipse class="eye" cx="140" cy="102" rx="7" ry="11" fill="#3b2f2f"/>
            <circle cx="88"  cy="122" r="7" fill="#ffab91" opacity=".7"/>
            <circle cx="152" cy="122" r="7" fill="#ffab91" opacity=".7"/>
            <path d="M105 128 Q 120 142 135 128" stroke="#3b2f2f" stroke-width="5" fill="none" stroke-linecap="round"/>
          </g>
        </g>
        <path d="M78 262 L 162 262 L 152 298 L 88 298 Z" fill="#c96f4a"/>
        <rect x="70" y="254" width="100" height="14" rx="7" fill="#b35d3b"/>
      </svg>
    </button>
    <p class="hint" data-i18n="pokeHint">戳一下小花,它会回应你</p>
  </div>

  <section class="panel">
    <div class="row">
      <label data-i18n="power">小花开关</label>
      <label class="switch"><input type="checkbox" id="optEnabled" /><span class="slider"></span></label>
    </div>
    <div class="row">
      <label data-i18n="hourlyChime">整点报时</label>
      <label class="switch"><input type="checkbox" id="optHourly" /><span class="slider"></span></label>
    </div>
    <div class="row">
      <label data-i18n="autoChatter">自动闲聊</label>
      <label class="switch"><input type="checkbox" id="optChatter" /><span class="slider"></span></label>
    </div>
    <div class="row">
      <label data-i18n="chatterFreq">闲聊频率</label>
      <select id="optFreq">
        <option value="chatty" data-i18n="freqChatty">话痨(2–6 分钟)</option>
        <option value="normal" data-i18n="freqNormal">正常(8–20 分钟)</option>
        <option value="quiet" data-i18n="freqQuiet">安静(25–45 分钟)</option>
      </select>
    </div>
    <div class="row">
      <label data-i18n="quietNight">夜间休息</label>
      <label class="switch"><input type="checkbox" id="optNight" /><span class="slider"></span></label>
    </div>
    <div class="row times">
      <label data-i18n="wakeTime">起床</label>
      <input type="time" id="optWake" />
      <label data-i18n="sleepTime">睡觉</label>
      <input type="time" id="optSleep" />
    </div>
    <div class="row">
      <label data-i18n="language">语言</label>
      <select id="optLang">
        <option value="zh">中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
      </select>
    </div>
    <div class="row">
      <label data-i18n="voice">声音</label>
      <select id="optVoice"></select>
    </div>
  </section>

  <section class="panel">
    <h2 data-i18n="plansTitle">计划提醒</h2>
    <form id="planForm" class="plan-form">
      <input type="time" id="planTime" required />
      <input type="text" id="planText" maxlength="60" required placeholder="例如:去开会 / 喝水" data-i18n-placeholder="planPlaceholder" />
      <select id="planRepeat">
        <option value="daily" data-i18n="repeatDaily">每天</option>
        <option value="once" data-i18n="repeatOnce">仅一次</option>
      </select>
      <button type="submit" class="btn" data-i18n="addPlan">添加</button>
    </form>
    <ul id="planList" class="plan-list"></ul>
    <p class="empty-note hidden" id="planEmpty" data-i18n="plansEmpty">还没有计划,添加一条试试吧</p>
  </section>

  <footer data-i18n="disclaimer">粉丝自制,与任天堂无关;台词原创,语音来自系统 TTS。</footer>

  <script src="lines.js"></script>
  <script src="popup.js"></script>
</body>
</html>
